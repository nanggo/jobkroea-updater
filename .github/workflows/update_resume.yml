# .github/workflows/update_resume.yml
name: Update Resume

on:
  schedule:
    - cron: "50 23 * * *" # KST 기준 오전 8:50 (UTC 23:50)
    - cron: "50 3 * * *" # KST 기준 오후 12:50 (UTC 3:50)
  workflow_dispatch: # 수동 실행을 위해 추가

concurrency:
  group: update-resume
  cancel-in-progress: false

jobs:
  update-resume:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(npx playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright/
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps

      - name: Build project
        run: pnpm tsc

      - name: Probe JobKorea login endpoint
        id: jobkorea-probe
        continue-on-error: true
        run: |
          curl --silent --show-error --location \
            --connect-timeout 10 \
            --max-time 30 \
            --retry 2 \
            --retry-delay 5 \
            --retry-all-errors \
            --output /dev/null \
            --write-out "http_code=%{http_code}\ntime_namelookup=%{time_namelookup}\ntime_connect=%{time_connect}\ntime_appconnect=%{time_appconnect}\ntime_starttransfer=%{time_starttransfer}\ntime_total=%{time_total}\nurl_effective=%{url_effective}\n" \
            https://www.jobkorea.co.kr/Login/

      - name: Notify JobKorea probe failure
        if: steps.jobkorea-probe.outcome == 'failure'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          if [ "${RUN_ATTEMPT}" = "1" ]; then
            MESSAGE="$(cat <<EOF
          ⚠️ 이력서 업데이트 일시 실패
          이유: GitHub Actions runner에서 JobKorea 로그인 페이지에 연결할 수 없습니다.
          조치: 새 runner로 자동 재시도 예정입니다. (최대 1회)
          대상: https://www.jobkorea.co.kr/Login/
          확인: ${RUN_URL}
          시간: $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S KST')
          EOF
          )"
          else
            MESSAGE="$(cat <<EOF
          ❌ 이력서 업데이트 최종 실패!
          이유: GitHub Actions runner에서 JobKorea 로그인 페이지에 연결할 수 없습니다.
          재시도: 자동 재시도 후에도 연결 실패
          대상: https://www.jobkorea.co.kr/Login/
          확인: ${RUN_URL}
          시간: $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S KST')
          EOF
          )"
          fi

          curl --silent --show-error --fail \
            --request POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}" || echo "Telegram probe failure notification failed"

          exit 1

      - name: Run update script
        if: steps.jobkorea-probe.outcome == 'success'
        env:
          JOBKOREA_ID: ${{ secrets.JOBKOREA_ID }}
          JOBKOREA_PWD: ${{ secrets.JOBKOREA_PWD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NAVIGATION_TIMEOUT_MS: "30000"
        run: node dist/index.js

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: jobkorea-failure-artifacts
          path: |
            error-*.png
            error-*.html
          if-no-files-found: ignore
          retention-days: 7

  workflow-keepalive:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: liskin/gh-workflow-keepalive@v1
